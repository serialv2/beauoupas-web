<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeauOuPas — Nouveau projet</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">BeauOuPas</div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer"><div id="sidebar-user"></div></div>
</aside>
<nav class="bottom-nav" id="bottom-nav"></nav>

<main class="main-content">
  <div style="max-width:560px;margin:0 auto;">
    <button onclick="history.back()" style="background:none;border:none;color:#888;cursor:pointer;font-size:14px;margin-bottom:12px;">← Retour</button>
    <h1 style="font-size:26px;font-weight:900;margin-bottom:24px;">➕ Nouveau projet</h1>

    <div class="card" style="padding:28px;">
      <div id="error" class="alert alert-error"></div>
      <div id="success" class="alert alert-success"></div>

      <div style="display:flex;flex-direction:column;gap:18px;">

        <div>
          <label class="input-label">Type de projet</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;">
            <button id="btn-photo" onclick="setType('photo')"
              style="padding:14px;border-radius:12px;border:2px solid #E91E8C;background:rgba(233,30,140,0.1);color:#E91E8C;font-weight:800;cursor:pointer;font-size:15px;font-family:Arial;">
              📸 Photo unique
            </button>
            <button id="btn-duel" onclick="setType('duel')"
              style="padding:14px;border-radius:12px;border:1px solid #292929;background:transparent;color:#888;font-weight:400;cursor:pointer;font-size:15px;font-family:Arial;">
              ⚖️ Duel A/B
            </button>
          </div>
        </div>

        <div>
          <label class="input-label">Titre</label>
          <input class="input" id="title" placeholder="Comment je suis ?">
        </div>

        <div>
          <label class="input-label">Description <span style="color:#444;">(optionnel)</span></label>
          <textarea class="input" id="description" placeholder="Donne plus de contexte..." rows="3" style="resize:vertical;"></textarea>
        </div>

        <div>
          <label class="input-label" id="upload-label">Photo (1 requise)</label>
          <label style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:28px;border-radius:14px;cursor:pointer;border:2px dashed #292929;background:#111;color:#555;font-size:14px;">
            <span style="font-size:36px;">📁</span>
            <span id="upload-text">Clique pour choisir une photo</span>
            <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="handleFiles(this)">
          </label>
          <div id="previews" style="display:grid;gap:10px;margin-top:12px;"></div>
        </div>

        <button class="btn btn-primary btn-full" id="submitBtn" onclick="handleSubmit()">
          🚀 Créer le projet
        </button>

      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="navbar.js"></script>
<script>

var currentUser = null;
var projectType = 'photo';
var selectedFiles = [];

async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;
  renderNav('projects.html');
  loadSidebarProfile();
}

function setType(type) {
  projectType = type;
  selectedFiles = [];
  document.getElementById('previews').innerHTML = '';
  document.getElementById('file-input').multiple = (type === 'duel');

  if (type === 'photo') {
    document.getElementById('btn-photo').style.cssText = 'padding:14px;border-radius:12px;border:2px solid #E91E8C;background:rgba(233,30,140,0.1);color:#E91E8C;font-weight:800;cursor:pointer;font-size:15px;font-family:Arial;';
    document.getElementById('btn-duel').style.cssText = 'padding:14px;border-radius:12px;border:1px solid #292929;background:transparent;color:#888;font-weight:400;cursor:pointer;font-size:15px;font-family:Arial;';
    document.getElementById('upload-label').textContent = 'Photo (1 requise)';
    document.getElementById('upload-text').textContent = 'Clique pour choisir une photo';
  } else {
    document.getElementById('btn-duel').style.cssText = 'padding:14px;border-radius:12px;border:2px solid #E91E8C;background:rgba(233,30,140,0.1);color:#E91E8C;font-weight:800;cursor:pointer;font-size:15px;font-family:Arial;';
    document.getElementById('btn-photo').style.cssText = 'padding:14px;border-radius:12px;border:1px solid #292929;background:transparent;color:#888;font-weight:400;cursor:pointer;font-size:15px;font-family:Arial;';
    document.getElementById('upload-label').textContent = 'Photos (2 requises)';
    document.getElementById('upload-text').textContent = 'Clique pour choisir 2 photos';
  }
}

function handleFiles(input) {
  var files = Array.from(input.files);
  selectedFiles = (projectType === 'duel') ? files.slice(0, 2) : files.slice(0, 1);
  document.getElementById('previews').style.gridTemplateColumns = selectedFiles.length > 1 ? '1fr 1fr' : '1fr';
  document.getElementById('previews').innerHTML = selectedFiles.map(function(f, i) {
    var url = URL.createObjectURL(f);
    var label = (projectType === 'duel')
      ? '<div style="position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.7);border-radius:8px;padding:4px 10px;font-weight:900;color:#E91E8C;">' + (i === 0 ? 'A' : 'B') + '</div>'
      : '';
    return '<div style="position:relative;"><img src="' + url + '" style="width:100%;height:160px;object-fit:cover;border-radius:12px;" alt="">' + label + '</div>';
  }).join('');
}

async function handleSubmit() {
  var title = document.getElementById('title').value.trim();
  var description = document.getElementById('description').value;

  document.getElementById('error').style.display = 'none';
  document.getElementById('success').style.display = 'none';

  if (!title) { showError('error', 'Le titre est obligatoire.'); return; }
  if (selectedFiles.length === 0) { showError('error', 'Ajoute au moins une photo.'); return; }
  if (projectType === 'duel' && selectedFiles.length < 2) { showError('error', 'Le duel nécessite 2 photos.'); return; }

  setLoading('submitBtn', true, '🚀 Créer le projet');

  try {
    // ✅ Utiliser les valeurs exactes de l'enum project_type
    var dbType = (projectType === 'duel') ? 'duel' : 'photo_vote';

    var insertResult = await db.from('projects').insert({
      owner_id: currentUser.id,
      title: title,
      description: description,
      type: dbType,
      status: 'approved',
      is_open: true
    }).select().single();

    if (insertResult.error) { throw insertResult.error; }

    var project = insertResult.data;

    for (var i = 0; i < selectedFiles.length; i++) {
      var file = selectedFiles[i];
      var ext = file.name.split('.').pop() || 'jpg';
      var path = 'display/' + currentUser.id + '/' + Date.now() + '_' + i + '.' + ext;

      var uploadResult = await db.storage.from('photos').upload(path, file);
      if (uploadResult.error) { throw uploadResult.error; }

      var urlResult = db.storage.from('photos').getPublicUrl(path);
      var publicUrl = urlResult.data.publicUrl;

      var photoInsert = await db.from('project_photos').insert({
        project_id: project.id,
        url: publicUrl,
        side: (projectType === 'duel') ? (i === 0 ? 'A' : 'B') : null
      });

      if (photoInsert.error) { throw photoInsert.error; }
    }

    showSuccess('success', '✅ Projet créé ! Redirection...');
    setTimeout(function() { window.location.href = 'projects.html'; }, 1200);

  } catch(err) {
    console.error(err);
    showError('error', err.message || 'Erreur lors de la création.');
    setLoading('submitBtn', false, '🚀 Créer le projet');
  }
}

init();

</script>
</body>
</html>

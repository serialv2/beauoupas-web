<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeauOuPas — Nouveau projet</title>
<link rel="stylesheet" href="style.css">
<style>
.photo-slot {
  border: 2px dashed #292929;
  border-radius: 14px;
  background: #111;
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color 0.15s;
  overflow: hidden;
  position: relative;
}
.photo-slot:hover { border-color: #E91E8C; }
.photo-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
.photo-slot .slot-label {
  position: absolute;
  top: 8px; left: 8px;
  background: rgba(0,0,0,0.7);
  border-radius: 8px;
  padding: 4px 10px;
  font-weight: 900;
  color: #E91E8C;
  font-size: 14px;
  z-index: 2;
}
.photo-slot .slot-remove {
  position: absolute;
  top: 8px; right: 8px;
  background: rgba(0,0,0,0.7);
  border: none;
  border-radius: 50%;
  width: 28px; height: 28px;
  color: white;
  font-size: 14px;
  cursor: pointer;
  z-index: 2;
  display: none;
}
.photo-slot.filled .slot-remove { display: flex; align-items: center; justify-content: center; }
.photo-slot .slot-placeholder { color: #444; text-align: center; }
.photo-slot .slot-placeholder span { font-size: 32px; display: block; margin-bottom: 8px; }
.range-container { position: relative; }
.range-labels { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-top: 6px; }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">BeauOuPas</div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer"><div id="sidebar-user"></div></div>
</aside>
<nav class="bottom-nav" id="bottom-nav"></nav>

<main class="main-content">
  <div style="max-width:560px;margin:0 auto;">
    <button onclick="history.back()" style="background:none;border:none;color:#888;cursor:pointer;font-size:14px;margin-bottom:12px;">← Retour</button>
    <h1 style="font-size:26px;font-weight:900;margin-bottom:24px;">➕ Nouveau projet</h1>

    <div class="card" style="padding:28px;">
      <div id="error" class="alert alert-error"></div>
      <div id="success" class="alert alert-success"></div>

      <div style="display:flex;flex-direction:column;gap:20px;">

        <!-- Type -->
        <div>
          <label class="input-label">Type de projet</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;">
            <button id="btn-photo" onclick="setType('photo')"
              style="padding:14px;border-radius:12px;border:2px solid #E91E8C;background:rgba(233,30,140,0.1);color:#E91E8C;font-weight:800;cursor:pointer;font-size:15px;font-family:Arial;">
              📸 Photo unique
            </button>
            <button id="btn-duel" onclick="setType('duel')"
              style="padding:14px;border-radius:12px;border:1px solid #292929;background:transparent;color:#888;font-weight:400;cursor:pointer;font-size:15px;font-family:Arial;">
              ⚖️ Duel A/B
            </button>
          </div>
        </div>

        <!-- Titre -->
        <div>
          <label class="input-label">Titre</label>
          <input class="input" id="title" placeholder="Comment je suis ?">
        </div>

        <!-- Description -->
        <div>
          <label class="input-label">Description <span style="color:#444;">(optionnel)</span></label>
          <textarea class="input" id="description" placeholder="Donne plus de contexte..." rows="3" style="resize:vertical;"></textarea>
        </div>

        <!-- Photos -->
        <div id="photos-section">
          <label class="input-label" id="photos-label">Photo</label>
          <div id="photos-grid" style="display:grid;grid-template-columns:1fr;gap:12px;margin-top:8px;">
            <!-- Slot photo unique -->
            <div class="photo-slot" id="slot-single" onclick="triggerFile('file-single')">
              <div class="slot-placeholder"><span>📁</span>Clique pour choisir une photo</div>
              <button class="slot-remove" onclick="removePhoto('single', event)">✕</button>
              <input type="file" id="file-single" accept="image/*" style="display:none;" onchange="handleFile(this, 'single')">
            </div>
          </div>
        </div>

        <!-- Filtre genre -->
        <div>
          <label class="input-label">Montrer à</label>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:6px;">
            <button id="gf-all" onclick="setGenderFilter('all')"
              style="padding:10px;border-radius:10px;border:2px solid #E91E8C;background:rgba(233,30,140,0.1);color:#E91E8C;font-weight:800;cursor:pointer;font-size:13px;font-family:Arial;">
              👥 Tous
            </button>
            <button id="gf-male" onclick="setGenderFilter('male')"
              style="padding:10px;border-radius:10px;border:1px solid #292929;background:transparent;color:#888;font-weight:400;cursor:pointer;font-size:13px;font-family:Arial;">
              👨 Hommes
            </button>
            <button id="gf-female" onclick="setGenderFilter('female')"
              style="padding:10px;border-radius:10px;border:1px solid #292929;background:transparent;color:#888;font-weight:400;cursor:pointer;font-size:13px;font-family:Arial;">
              👩 Femmes
            </button>
          </div>
        </div>

        <!-- Tranche d'âge -->
        <div>
          <label class="input-label">Tranche d'âge : <span id="age-display" style="color:#E91E8C;font-weight:800;">18 – 99 ans</span></label>
          <div style="margin-top:10px;display:flex;flex-direction:column;gap:10px;">
            <div>
              <div style="font-size:12px;color:#666;margin-bottom:4px;">Âge minimum</div>
              <input type="range" id="age-min" min="13" max="99" value="18"
                style="width:100%;accent-color:#E91E8C;" oninput="updateAgeDisplay()">
            </div>
            <div>
              <div style="font-size:12px;color:#666;margin-bottom:4px;">Âge maximum</div>
              <input type="range" id="age-max" min="13" max="99" value="99"
                style="width:100%;accent-color:#E91E8C;" oninput="updateAgeDisplay()">
            </div>
          </div>
        </div>

        <button class="btn btn-primary btn-full" id="submitBtn" onclick="handleSubmit()">
          🚀 Créer le projet
        </button>

      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="navbar.js"></script>
<script>

var currentUser = null;
var projectType = 'photo';
var genderFilter = 'all';
var photoFiles = { single: null, left: null, right: null };
var photoPreviews = { single: null, left: null, right: null };

async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;

  // Vérifier profil complet
  var profile = await getProfile(currentUser.id);
  if (!profile || !profile.username || !profile.gender || !profile.birth_date) {
    window.location.href = 'complete-profile.html';
    return;
  }

  renderNav('projects.html');
  loadSidebarProfile();
}

function setType(type) {
  projectType = type;
  photoFiles = { single: null, left: null, right: null };
  photoPreviews = { single: null, left: null, right: null };

  if (type === 'photo') {
    document.getElementById('btn-photo').style.cssText = 'padding:14px;border-radius:12px;border:2px solid #E91E8C;background:rgba(233,30,140,0.1);color:#E91E8C;font-weight:800;cursor:pointer;font-size:15px;font-family:Arial;';
    document.getElementById('btn-duel').style.cssText = 'padding:14px;border-radius:12px;border:1px solid #292929;background:transparent;color:#888;font-weight:400;cursor:pointer;font-size:15px;font-family:Arial;';
    document.getElementById('photos-label').textContent = 'Photo';
    document.getElementById('photos-grid').style.gridTemplateColumns = '1fr';
    document.getElementById('photos-grid').innerHTML =
      '<div class="photo-slot" id="slot-single" onclick="triggerFile(\'file-single\')">' +
        '<div class="slot-placeholder"><span>📁</span>Clique pour choisir une photo</div>' +
        '<button class="slot-remove" onclick="removePhoto(\'single\', event)">✕</button>' +
        '<input type="file" id="file-single" accept="image/*" style="display:none;" onchange="handleFile(this, \'single\')">' +
      '</div>';
  } else {
    document.getElementById('btn-duel').style.cssText = 'padding:14px;border-radius:12px;border:2px solid #E91E8C;background:rgba(233,30,140,0.1);color:#E91E8C;font-weight:800;cursor:pointer;font-size:15px;font-family:Arial;';
    document.getElementById('btn-photo').style.cssText = 'padding:14px;border-radius:12px;border:1px solid #292929;background:transparent;color:#888;font-weight:400;cursor:pointer;font-size:15px;font-family:Arial;';
    document.getElementById('photos-label').textContent = 'Photos du duel';
    document.getElementById('photos-grid').style.gridTemplateColumns = '1fr 1fr';
    document.getElementById('photos-grid').innerHTML =
      '<div>' +
        '<div style="font-size:12px;color:#888;margin-bottom:6px;font-weight:700;">PHOTO A (Gauche)</div>' +
        '<div class="photo-slot" id="slot-left" onclick="triggerFile(\'file-left\')">' +
          '<div class="slot-placeholder"><span>📁</span>Photo A</div>' +
          '<div class="slot-label">A</div>' +
          '<button class="slot-remove" onclick="removePhoto(\'left\', event)">✕</button>' +
          '<input type="file" id="file-left" accept="image/*" style="display:none;" onchange="handleFile(this, \'left\')">' +
        '</div>' +
      '</div>' +
      '<div>' +
        '<div style="font-size:12px;color:#888;margin-bottom:6px;font-weight:700;">PHOTO B (Droite)</div>' +
        '<div class="photo-slot" id="slot-right" onclick="triggerFile(\'file-right\')">' +
          '<div class="slot-placeholder"><span>📁</span>Photo B</div>' +
          '<div class="slot-label">B</div>' +
          '<button class="slot-remove" onclick="removePhoto(\'right\', event)">✕</button>' +
          '<input type="file" id="file-right" accept="image/*" style="display:none;" onchange="handleFile(this, \'right\')">' +
        '</div>' +
      '</div>';
  }
}

function triggerFile(inputId) {
  var input = document.getElementById(inputId);
  if (input) input.click();
}

function handleFile(input, slot) {
  var file = input.files[0];
  if (!file) return;
  photoFiles[slot] = file;
  var url = URL.createObjectURL(file);
  photoPreviews[slot] = url;
  var slotEl = document.getElementById('slot-' + slot);
  if (!slotEl) return;
  slotEl.classList.add('filled');
  // Retirer ancien aperçu
  var oldImg = slotEl.querySelector('img');
  if (oldImg) oldImg.remove();
  var img = document.createElement('img');
  img.src = url;
  slotEl.insertBefore(img, slotEl.firstChild);
}

function removePhoto(slot, event) {
  event.stopPropagation();
  photoFiles[slot] = null;
  photoPreviews[slot] = null;
  var slotEl = document.getElementById('slot-' + slot);
  if (!slotEl) return;
  slotEl.classList.remove('filled');
  var img = slotEl.querySelector('img');
  if (img) img.remove();
  var input = slotEl.querySelector('input[type="file"]');
  if (input) input.value = '';
}

function setGenderFilter(gf) {
  genderFilter = gf;
  var map = { all: 'gf-all', male: 'gf-male', female: 'gf-female' };
  Object.keys(map).forEach(function(k) {
    var btn = document.getElementById(map[k]);
    if (!btn) return;
    if (k === gf) {
      btn.style.cssText = 'padding:10px;border-radius:10px;border:2px solid #E91E8C;background:rgba(233,30,140,0.1);color:#E91E8C;font-weight:800;cursor:pointer;font-size:13px;font-family:Arial;';
    } else {
      btn.style.cssText = 'padding:10px;border-radius:10px;border:1px solid #292929;background:transparent;color:#888;font-weight:400;cursor:pointer;font-size:13px;font-family:Arial;';
    }
  });
}

function updateAgeDisplay() {
  var min = parseInt(document.getElementById('age-min').value);
  var max = parseInt(document.getElementById('age-max').value);
  if (min > max) {
    document.getElementById('age-min').value = max;
    min = max;
  }
  document.getElementById('age-display').textContent = min + ' – ' + max + ' ans';
}

async function uploadPhoto(file, projectId, slot) {
  var ext = file.name.split('.').pop() || 'jpg';
  var path = 'display/' + currentUser.id + '/' + Date.now() + '_' + slot + '.' + ext;
  var uploadResult = await db.storage.from('photos').upload(path, file);
  if (uploadResult.error) throw uploadResult.error;
  var urlResult = db.storage.from('photos').getPublicUrl(path);
  return urlResult.data.publicUrl;
}

async function handleSubmit() {
  var title = document.getElementById('title').value.trim();
  var description = document.getElementById('description').value;
  var minAge = parseInt(document.getElementById('age-min').value);
  var maxAge = parseInt(document.getElementById('age-max').value);

  document.getElementById('error').style.display = 'none';
  document.getElementById('success').style.display = 'none';

  if (!title) { showError('error', 'Le titre est obligatoire.'); return; }

  if (projectType === 'photo' && !photoFiles.single) {
    showError('error', 'Ajoute une photo.'); return;
  }
  if (projectType === 'duel' && (!photoFiles.left || !photoFiles.right)) {
    showError('error', 'Ajoute les 2 photos du duel (A et B).'); return;
  }

  setLoading('submitBtn', true, '🚀 Création en cours...');

  try {
    // Créer le projet
    var insertResult = await db.from('projects').insert({
      owner_id: currentUser.id,
      title: title,
      description: description,
      type: projectType === 'duel' ? 'duel' : 'photo_vote',
      status: 'approved',
      is_open: true,
      gender_filter: genderFilter === 'all' ? 'both' : genderFilter,
      min_age: minAge,
      max_age: maxAge
    }).select().single();

    if (insertResult.error) throw insertResult.error;
    var project = insertResult.data;

    // Upload et insertion photos
    if (projectType === 'photo') {
      var url = await uploadPhoto(photoFiles.single, project.id, 'single');
      var r = await db.from('project_photos').insert({ project_id: project.id, url: url, side: 'single' });
      if (r.error) throw r.error;
    } else {
      var urlLeft = await uploadPhoto(photoFiles.left, project.id, 'left');
      var rLeft = await db.from('project_photos').insert({ project_id: project.id, url: urlLeft, side: 'left' });
      if (rLeft.error) throw rLeft.error;

      var urlRight = await uploadPhoto(photoFiles.right, project.id, 'right');
      var rRight = await db.from('project_photos').insert({ project_id: project.id, url: urlRight, side: 'right' });
      if (rRight.error) throw rRight.error;
    }

    showSuccess('success', '✅ Projet créé ! Redirection...');
    setTimeout(function() { window.location.href = 'projects.html'; }, 1200);

  } catch(err) {
    console.error(err);
    showError('error', err.message || 'Erreur lors de la création.');
    setLoading('submitBtn', false, '🚀 Créer le projet');
  }
}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeauOuPas — Profil ami</title>
<link rel="stylesheet" href="style.css">
<style>
.vote-buttons { display:flex; gap:10px; padding:12px 16px; border-top:1px solid #1A1A1A; }
.vote-btn { flex:1; padding:12px 6px; border-radius:12px; border:2px solid #292929; background:transparent; color:#888; font-size:20px; cursor:pointer; transition:all 0.15s; font-family:Arial; display:flex; flex-direction:column; align-items:center; gap:3px; }
.vote-btn span.label { font-size:10px; color:#666; }
.vote-btn.like:hover { border-color:#4CAF50; background:rgba(76,175,80,0.1); color:#4CAF50; }
.vote-btn.bof:hover  { border-color:#FF9800; background:rgba(255,152,0,0.1); color:#FF9800; }
.vote-btn.dislike:hover { border-color:#ef5350; background:rgba(244,67,54,0.1); color:#ef5350; }
.duel-photo-btn { flex:1; padding:0; border:none; background:transparent; cursor:pointer; position:relative; overflow:hidden; }
.duel-photo-btn:hover .duel-overlay { opacity:1; }
.duel-overlay { position:absolute; inset:0; background:rgba(233,30,140,0.35); display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:900; color:white; opacity:0; transition:opacity 0.15s; }
.project-card { position:relative; margin-bottom:16px; }
.voted-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.65); display:flex; align-items:center; justify-content:center; font-size:48px; z-index:10; border-radius:22px; pointer-events:none; }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">BeauOuPas</div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <a href="projects-new.html" class="btn btn-primary btn-full" style="margin-bottom:14px;text-decoration:none;">➕ Nouveau projet</a>
    <div id="sidebar-user"></div>
  </div>
</aside>
<nav class="bottom-nav" id="bottom-nav"></nav>

<main class="main-content">
  <div style="max-width:680px;margin:0 auto;">

    <!-- Retour -->
    <button onclick="history.back()" style="background:none;border:none;color:#888;cursor:pointer;font-size:14px;margin-bottom:16px;">← Retour</button>

    <!-- Header profil ami -->
    <div class="card" style="display:flex;align-items:center;gap:16px;padding:20px 24px;margin-bottom:20px;">
      <div class="avatar" id="friend-avatar" style="width:64px;height:64px;font-size:24px;">?</div>
      <div style="flex:1;">
        <div id="friend-username" style="font-weight:900;font-size:20px;"></div>
        <div id="friend-stats" style="color:#666;font-size:13px;margin-top:4px;"></div>
      </div>
      <button id="chat-btn" class="btn btn-primary btn-sm" onclick="openChat()" style="flex-shrink:0;">
        💬 Message
      </button>
    </div>

    <!-- Projets -->
    <h2 style="font-size:18px;font-weight:900;margin-bottom:16px;">📸 Projets de <span id="friend-name-title"></span></h2>
    <div id="projects-container"><div class="spinner"></div></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="navbar.js"></script>
<script>
var currentUser = null;
var currentProfile = null;
var friendUserId = null;
var friendshipId = null;
var friendUsername = '';
var votedIds = new Set();

async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;
  currentProfile = await getProfile(currentUser.id);
  renderNav('friends.html');
  loadSidebarProfile();

  // Lire les params URL
  var params = new URLSearchParams(window.location.search);
  friendUserId = params.get('user_id');
  friendshipId = params.get('friendship_id');
  friendUsername = params.get('username') || '?';
  var avatarUrl = params.get('avatar');

  if (!friendUserId) { window.location.href = 'friends.html'; return; }

  // Afficher le header
  document.getElementById('friend-name-title').textContent = '@' + friendUsername;
  document.getElementById('friend-username').textContent = '@' + friendUsername;

  var avatarEl = document.getElementById('friend-avatar');
  if (avatarUrl) {
    avatarEl.innerHTML = '<img src="' + avatarUrl + '" style="width:100%;height:100%;object-fit:cover;" alt="">';
  } else {
    avatarEl.textContent = friendUsername[0].toUpperCase();
  }

  loadProjects();
}

async function loadProjects() {
  // Récupérer les projets de l'ami
  var result = await db.from('projects')
    .select('*, project_photos(id, url, side)')
    .eq('owner_id', friendUserId)
    .eq('status', 'approved')
    .order('created_at', { ascending: false });

  if (result.error || !result.data || result.data.length === 0) {
    document.getElementById('projects-container').innerHTML =
      '<div class="card" style="text-align:center;padding:40px;">' +
      '<div style="font-size:48px;margin-bottom:12px;">📭</div>' +
      '<p style="color:#666;">Aucun projet pour l\'instant</p>' +
      '</div>';
    document.getElementById('friend-stats').textContent = '0 projet';
    return;
  }

  var projects = result.data;
  document.getElementById('friend-stats').textContent = projects.length + ' projet' + (projects.length > 1 ? 's' : '');

  // Récupérer les votes déjà effectués
  var ids = projects.map(function(p) { return p.id; });
  var pv = await db.from('photo_votes').select('project_id').eq('user_id', currentUser.id).in('project_id', ids);
  var dv = await db.from('duel_votes').select('project_id').eq('user_id', currentUser.id).in('project_id', ids);
  (pv.data || []).forEach(function(v) { votedIds.add(v.project_id); });
  (dv.data || []).forEach(function(v) { votedIds.add(v.project_id); });

  document.getElementById('projects-container').innerHTML = projects.map(function(p) {
    return renderProject(p);
  }).join('');
}

function renderProject(p) {
  var photos = p.project_photos || [];
  var isDuel = p.type === 'duel';
  var voted = votedIds.has(p.id);

  var photoL = photos.find(function(ph) { return ph.side === 'left' || ph.side === 'A'; }) || photos[0];
  var photoR = photos.find(function(ph) { return ph.side === 'right' || ph.side === 'B'; }) || photos[1];
  var photoS = photos.find(function(ph) { return ph.side === 'single'; }) || photos[0];

  var photosHtml = '';
  var buttonsHtml = '';

  if (isDuel && photoL && photoR) {
    photosHtml =
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;">' +
        '<button class="duel-photo-btn" ' + (voted ? 'disabled' : 'onclick="voteDuel(\'' + p.id + '\',\'left\')"') + '>' +
          '<img src="' + photoL.url + '" style="width:100%;aspect-ratio:1;object-fit:contain;background:#000;display:block;" alt="">' +
          '<div style="position:absolute;top:6px;left:6px;background:rgba(0,0,0,0.65);border-radius:6px;padding:3px 8px;font-size:12px;font-weight:900;color:#E91E8C;">A</div>' +
          (!voted ? '<div class="duel-overlay">✅ A</div>' : '') +
        '</button>' +
        '<button class="duel-photo-btn" ' + (voted ? 'disabled' : 'onclick="voteDuel(\'' + p.id + '\',\'right\')"') + '>' +
          '<img src="' + photoR.url + '" style="width:100%;aspect-ratio:1;object-fit:contain;background:#000;display:block;" alt="">' +
          '<div style="position:absolute;top:6px;left:6px;background:rgba(0,0,0,0.65);border-radius:6px;padding:3px 8px;font-size:12px;font-weight:900;color:#E91E8C;">B</div>' +
          (!voted ? '<div class="duel-overlay">✅ B</div>' : '') +
        '</button>' +
      '</div>';
    if (!voted) {
      buttonsHtml = '<div style="padding:10px 16px;text-align:center;"><p style="color:#888;font-size:12px;">👆 Clique sur A ou B pour voter</p></div>';
    }
  } else if (photoS) {
    photosHtml = '<div style="background:#000;"><img src="' + photoS.url + '" style="width:100%;max-height:400px;object-fit:contain;display:block;" alt=""></div>';
    if (!voted) {
      buttonsHtml =
        '<div class="vote-buttons">' +
          '<button class="vote-btn like" onclick="votePhoto(\'' + p.id + '\',1)">❤️<span class="label">J\'aime</span></button>' +
          '<button class="vote-btn bof" onclick="votePhoto(\'' + p.id + '\',2)">😐<span class="label">Bof</span></button>' +
          '<button class="vote-btn dislike" onclick="votePhoto(\'' + p.id + '\',3)">👎<span class="label">J\'aime pas</span></button>' +
        '</div>';
    }
  }

  return '<div class="card project-card" id="proj-' + p.id + '" style="padding:0;overflow:hidden;">' +
    '<div style="padding:12px 16px;border-bottom:1px solid #1A1A1A;display:flex;align-items:center;justify-content:space-between;">' +
      '<div style="font-weight:700;font-size:15px;">' + (p.title || 'Sans titre') + '</div>' +
      '<span class="badge badge-pink">' + (isDuel ? '⚖️ Duel' : '📸 Vote') + '</span>' +
    '</div>' +
    photosHtml +
    (voted ? '<div style="padding:12px 16px;text-align:center;color:#4CAF50;font-weight:700;font-size:13px;">✅ Déjà voté</div>' : buttonsHtml) +
    '</div>';
}

async function votePhoto(projectId, ratingValue) {
  var btns = document.querySelectorAll('#proj-' + projectId + ' .vote-btn');
  for (var i = 0; i < btns.length; i++) { btns[i].disabled = true; btns[i].style.opacity = '0.4'; }

  var result = await db.from('photo_votes').insert({
    user_id: currentUser.id,
    project_id: projectId,
    rating: ratingValue,
    voter_gender: currentProfile ? currentProfile.gender : null,
    voter_age: (currentProfile && currentProfile.birth_date) ? getAge(currentProfile.birth_date) : null
  });

  if (result.error) { console.error(result.error); return; }

  votedIds.add(projectId);
  var emoji = ratingValue === 1 ? '❤️' : ratingValue === 2 ? '😐' : '👎';
  showVotedOnCard(projectId, emoji);
}

async function voteDuel(projectId, chosenSide) {
  var btns = document.querySelectorAll('#proj-' + projectId + ' .duel-photo-btn');
  for (var i = 0; i < btns.length; i++) { btns[i].disabled = true; }

  var result = await db.from('duel_votes').insert({
    user_id: currentUser.id,
    project_id: projectId,
    chosen_side: chosenSide,
    voter_gender: currentProfile ? currentProfile.gender : null,
    voter_age: (currentProfile && currentProfile.birth_date) ? getAge(currentProfile.birth_date) : null
  });

  if (result.error) { console.error(result.error); return; }

  votedIds.add(projectId);
  showVotedOnCard(projectId, '✅');
}

function showVotedOnCard(projectId, emoji) {
  var card = document.getElementById('proj-' + projectId);
  if (!card) return;
  var overlay = document.createElement('div');
  overlay.className = 'voted-overlay';
  overlay.textContent = emoji;
  card.appendChild(overlay);
  setTimeout(function() {
    overlay.remove();
    // Remplacer les boutons par "Déjà voté"
    var vb = card.querySelector('.vote-buttons');
    if (vb) vb.outerHTML = '<div style="padding:12px 16px;text-align:center;color:#4CAF50;font-weight:700;font-size:13px;">✅ Déjà voté</div>';
  }, 800);
}

async function openChat() {
  // Chercher si un chat existe déjà
  var r1 = await db.from('chats').select('id').eq('user1_id', currentUser.id).eq('user2_id', friendUserId).single();
  var r2 = await db.from('chats').select('id').eq('user1_id', friendUserId).eq('user2_id', currentUser.id).single();

  var chatId = null;
  if (r1.data) {
    chatId = r1.data.id;
  } else if (r2.data) {
    chatId = r2.data.id;
  } else {
    // Créer le chat
    var created = await db.from('chats').insert({
      user1_id: currentUser.id,
      user2_id: friendUserId
    }).select().single();
    if (created.error) { console.error(created.error); return; }
    chatId = created.data.id;
  }

  window.location.href = 'chat.html?chat_id=' + chatId;
}

function getAge(birthDate) {
  var today = new Date();
  var birth = new Date(birthDate);
  var age = today.getFullYear() - birth.getFullYear();
  if (today < new Date(today.getFullYear(), birth.getMonth(), birth.getDate())) age--;
  return age;
}

init();
</script>
</body>
</html>

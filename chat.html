<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeauOuPas — Chat</title>
<link rel="stylesheet" href="style.css">
<style>
.chat-layout { display:flex; gap:16px; height:calc(100vh - 120px); }
.chat-list { width:260px; flex-shrink:0; display:flex; flex-direction:column; gap:8px; overflow-y:auto; }
.chat-item { display:flex; align-items:center; gap:12px; padding:14px; cursor:pointer; border-radius:14px; background:#151515; border:1px solid #292929; transition:border-color 0.15s; }
.chat-item:hover, .chat-item.active { border-color:#E91E8C; background:rgba(233,30,140,0.05); }
.chat-window { flex:1; display:flex; flex-direction:column; background:#151515; border:1px solid #292929; border-radius:22px; overflow:hidden; }
.messages { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:10px; }
.msg { display:flex; }
.msg.mine { justify-content:flex-end; }
.bubble { max-width:70%; padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.4; }
.bubble.mine { background:#E91E8C; border-radius:14px 14px 4px 14px; }
.bubble.other { background:#222; border-radius:14px 14px 14px 4px; }
.chat-input { padding:14px 16px; border-top:1px solid #1A1A1A; display:flex; gap:10px; }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">BeauOuPas</div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <a href="projects-new.html" class="btn btn-primary btn-full" style="margin-bottom:14px;text-decoration:none;">➕ Nouveau projet</a>
    <div id="sidebar-user"></div>
  </div>
</aside>
<nav class="bottom-nav" id="bottom-nav"></nav>

<main class="main-content">
  <div style="max-width:900px;margin:0 auto;">
    <h1 style="font-size:28px;font-weight:900;margin-bottom:20px;">💬 Chat</h1>
    <div class="chat-layout">
      <!-- Liste conversations -->
      <div class="chat-list" id="chat-list"><div class="spinner"></div></div>

      <!-- Fenêtre chat -->
      <div class="chat-window" id="chat-window">
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#444;">
          <div style="font-size:48px;margin-bottom:12px;">💬</div>
          <p>Sélectionne une conversation</p>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="navbar.js"></script>
<script>
let currentUser = null
let activeChat = null
let realtimeSub = null

async function init() {
  currentUser = await requireAuth()
  if (!currentUser) return
  renderNav('chat.html')
  loadSidebarProfile()
  loadChats()
}

async function loadChats() {
  const { data } = await db.from('chats').select('*')
    .or(`user1_id.eq.${currentUser.id},user2_id.eq.${currentUser.id}`)
    .order('last_message_at', { ascending: false })

  if (!data || data.length === 0) {
    document.getElementById('chat-list').innerHTML = `
      <div class="card" style="text-align:center;padding:30px;">
        <div style="font-size:36px;margin-bottom:8px;">💬</div>
        <p style="color:#666;font-size:14px;">Aucune conversation</p>
      </div>`
    return
  }

  const items = []
  for (const c of data) {
    const otherId = c.user1_id === currentUser.id ? c.user2_id : c.user1_id
    const { data: p } = await db.from('profiles').select('username, avatar_url').eq('id', otherId).single()
    if (p) items.push({ ...c, other_id: otherId, username: p.username, avatar_url: p.avatar_url })
  }

  document.getElementById('chat-list').innerHTML = items.map(c => `
    <div class="chat-item ${activeChat?.id === c.id ? 'active' : ''}" onclick="openChat(${JSON.stringify(c).replace(/"/g, '&quot;')})">
      <div class="avatar" style="width:40px;height:40px;font-size:16px;">
        ${c.avatar_url ? `<img src="${c.avatar_url}" alt="">` : c.username[0]?.toUpperCase()}
      </div>
      <div style="flex:1;overflow:hidden;text-align:left;">
        <div style="font-weight:800;font-size:14px;">@${c.username}</div>
        <div style="font-size:12px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.last_message || '...'}</div>
      </div>
    </div>`).join('')
}

async function openChat(chat) {
  activeChat = chat
  if (realtimeSub) { db.removeChannel(realtimeSub); realtimeSub = null }

  document.getElementById('chat-window').innerHTML = `
    <div style="padding:16px 20px;border-bottom:1px solid #1A1A1A;display:flex;align-items:center;gap:12px;">
      <div class="avatar" style="width:36px;height:36px;font-size:15px;">
        ${chat.avatar_url ? `<img src="${chat.avatar_url}" alt="">` : chat.username[0]?.toUpperCase()}
      </div>
      <span style="font-weight:800;">@${chat.username}</span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="chat-input">
      <input class="input" id="msg-input" placeholder="Votre message..." onkeydown="if(event.key==='Enter') sendMessage()" style="flex:1;">
      <button class="btn btn-primary btn-sm" onclick="sendMessage()">Envoyer</button>
    </div>`

  await loadMessages()
  scrollToBottom()

  // Realtime
  realtimeSub = db.channel(`chat-${chat.id}`)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `chat_id=eq.${chat.id}` },
      payload => { appendMessage(payload.new); scrollToBottom() })
    .subscribe()
}

async function loadMessages() {
  const { data } = await db.from('messages').select('*').eq('chat_id', activeChat.id).order('created_at')
  const container = document.getElementById('messages')
  if (!container) return
  container.innerHTML = (data || []).map(m => messageHtml(m)).join('')
}

function appendMessage(m) {
  const container = document.getElementById('messages')
  if (!container) return
  container.insertAdjacentHTML('beforeend', messageHtml(m))
}

function messageHtml(m) {
  const isMine = m.sender_id === currentUser.id
  return `<div class="msg ${isMine ? 'mine' : ''}">
    <div class="bubble ${isMine ? 'mine' : 'other'}">${m.content}</div>
  </div>`
}

async function sendMessage() {
  const input = document.getElementById('msg-input')
  const content = input?.value.trim()
  if (!content || !activeChat) return
  input.value = ''
  await db.from('messages').insert({ chat_id: activeChat.id, sender_id: currentUser.id, content })
  await db.from('chats').update({ last_message: content, last_message_at: new Date().toISOString() }).eq('id', activeChat.id)
  loadChats()
}

function scrollToBottom() {
  const m = document.getElementById('messages')
  if (m) m.scrollTop = m.scrollHeight
}

init()
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeauOuPas — Amis</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">BeauOuPas</div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <a href="projects-new.html" class="btn btn-primary btn-full" style="margin-bottom:14px;text-decoration:none;">➕ Nouveau projet</a>
    <div id="sidebar-user"></div>
  </div>
</aside>
<nav class="bottom-nav" id="bottom-nav"></nav>

<main class="main-content">
  <div style="max-width:680px;margin:0 auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;">
      <div>
        <h1 style="font-size:28px;font-weight:900;">👥 Amis</h1>
        <p id="count" style="color:#666;margin-top:6px;font-size:14px;"></p>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="generateInvite()">🔗 Inviter</button>
    </div>

    <!-- Recherche -->
    <div style="display:flex;gap:10px;margin-bottom:24px;">
      <input class="input" id="search-input" placeholder="🔍 Rechercher un utilisateur..." style="flex:1;"
        onkeydown="if(event.key==='Enter') searchUsers()">
      <button class="btn btn-primary btn-sm" onclick="searchUsers()">Chercher</button>
      <button class="btn btn-ghost btn-sm" id="cancel-search" onclick="cancelSearch()" style="display:none;">✕</button>
    </div>

    <div id="search-results" style="display:none;margin-bottom:24px;"></div>
    <div id="pending-container"></div>
    <div id="friends-container"><div class="spinner"></div></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="navbar.js"></script>
<script>
var currentUser = null;
var allFriends = [];

async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;
  var profile = await getProfile(currentUser.id);
  if (!profile || !profile.username || !profile.gender || !profile.birth_date) {
    window.location.href = 'complete-profile.html';
    return;
  }
  renderNav('friends.html');
  loadSidebarProfile();
  loadFriends();
}

async function loadFriends() {
  var sent = await db.from('friendships').select('*').eq('requester_id', currentUser.id);
  var received = await db.from('friendships').select('*').eq('receiver_id', currentUser.id);

  allFriends = [];
  for (var i = 0; i < (sent.data || []).length; i++) {
    var f = sent.data[i];
    var pr = await db.from('profiles').select('id, username, avatar_url').eq('id', f.receiver_id).single();
    if (pr.data) allFriends.push({ id: f.id, other_id: f.receiver_id, username: pr.data.username, avatar_url: pr.data.avatar_url, status: f.status, is_requester: true });
  }
  for (var j = 0; j < (received.data || []).length; j++) {
    var fr = received.data[j];
    var prr = await db.from('profiles').select('id, username, avatar_url').eq('id', fr.requester_id).single();
    if (prr.data) allFriends.push({ id: fr.id, other_id: fr.requester_id, username: prr.data.username, avatar_url: prr.data.avatar_url, status: fr.status, is_requester: false });
  }
  renderFriends();
}

function renderFriends() {
  var accepted = allFriends.filter(function(f) { return f.status === 'accepted'; });
  var pendingReceived = allFriends.filter(function(f) { return f.status === 'pending' && !f.is_requester; });

  document.getElementById('count').textContent = accepted.length + ' ami' + (accepted.length !== 1 ? 's' : '');

  // Demandes reçues
  if (pendingReceived.length > 0) {
    document.getElementById('pending-container').innerHTML =
      '<div class="card" style="margin-bottom:20px;padding:16px;">' +
      '<div style="font-weight:800;font-size:13px;color:#E91E8C;margin-bottom:12px;">📩 DEMANDES REÇUES</div>' +
      pendingReceived.map(function(f) {
        return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1A1A1A;">' +
          makeAvatar(f, 38) +
          '<div style="flex:1;font-weight:700;">@' + f.username + '</div>' +
          '<button class="btn btn-primary btn-sm" onclick="acceptFriend(\'' + f.id + '\')">✅ Accepter</button>' +
          '<button class="btn btn-ghost btn-sm" onclick="deleteFriend(\'' + f.id + '\')">✕</button>' +
          '</div>';
      }).join('') +
      '</div>';
  } else {
    document.getElementById('pending-container').innerHTML = '';
  }

  // Liste amis
  if (accepted.length === 0) {
    document.getElementById('friends-container').innerHTML =
      '<div class="card" style="text-align:center;padding:50px;">' +
      '<div style="font-size:48px;margin-bottom:12px;">👥</div>' +
      '<p style="color:#666;">Aucun ami pour l\'instant. Invite des gens !</p>' +
      '</div>';
  } else {
    document.getElementById('friends-container').innerHTML =
      '<div style="display:flex;flex-direction:column;gap:8px;">' +
      accepted.map(function(f) {
        return '<div class="card" style="display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;" onclick="openFriendProfile(\'' + f.other_id + '\',\'' + f.username + '\',\'' + (f.avatar_url||'') + '\',\'' + f.id + '\')">' +
          makeAvatar(f, 42) +
          '<div style="flex:1;">' +
            '<div style="font-weight:700;">@' + f.username + '</div>' +
            '<div style="font-size:12px;color:#666;margin-top:2px;">Voir les projets →</div>' +
          '</div>' +
          '<button onclick="event.stopPropagation();deleteFriend(\'' + f.id + '\')" style="background:none;border:none;color:#555;cursor:pointer;font-size:18px;padding:4px;">🗑️</button>' +
          '</div>';
      }).join('') +
      '</div>';
  }
}

function makeAvatar(f, size) {
  return '<div class="avatar" style="width:' + size + 'px;height:' + size + 'px;font-size:' + Math.round(size*0.4) + 'px;">' +
    (f.avatar_url ? '<img src="' + f.avatar_url + '" alt="">' : (f.username[0]||'?').toUpperCase()) +
    '</div>';
}

function openFriendProfile(userId, username, avatarUrl, friendshipId) {
  var url = 'friend-profile.html?user_id=' + userId + '&username=' + encodeURIComponent(username) + '&friendship_id=' + friendshipId;
  if (avatarUrl) url += '&avatar=' + encodeURIComponent(avatarUrl);
  window.location.href = url;
}

async function searchUsers() {
  var query = document.getElementById('search-input').value.trim();
  if (!query) return;
  document.getElementById('cancel-search').style.display = '';
  document.getElementById('search-results').style.display = 'block';
  document.getElementById('search-results').innerHTML = '<div class="spinner"></div>';

  var res = await db.from('profiles').select('id, username, avatar_url').ilike('username', '%' + query + '%').limit(15);
  var existingMap = {};
  allFriends.forEach(function(f) { existingMap[f.other_id] = f; });

  if (!res.data || res.data.length === 0) {
    document.getElementById('search-results').innerHTML = '<div class="card" style="text-align:center;padding:30px;"><p style="color:#666;">Aucun résultat pour "' + query + '"</p></div>';
    return;
  }

  var results = res.data.filter(function(p) { return p.id !== currentUser.id; });
  document.getElementById('search-results').innerHTML =
    '<div class="card" style="padding:16px;">' +
    '<div style="font-weight:800;font-size:13px;color:#888;margin-bottom:12px;">RÉSULTATS</div>' +
    results.map(function(p) {
      var rel = existingMap[p.id];
      var avatarEl = p.avatar_url
        ? '<div class="avatar" style="width:38px;height:38px;"><img src="' + p.avatar_url + '" alt=""></div>'
        : '<div class="avatar" style="width:38px;height:38px;font-size:15px;">' + (p.username[0]||'?').toUpperCase() + '</div>';
      var actionBtn = '<button class="btn btn-primary btn-sm" onclick="sendRequest(\'' + p.id + '\')">➕ Ajouter</button>';
      if (rel && rel.status === 'pending') actionBtn = '<span style="font-size:13px;color:#FF9800;">⏳ En attente</span>';
      if (rel && rel.status === 'accepted') actionBtn = '<span style="font-size:13px;color:#4CAF50;">✅ Ami</span>';
      return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1A1A1A;">' +
        avatarEl + '<div style="flex:1;font-weight:700;">@' + p.username + '</div>' + actionBtn + '</div>';
    }).join('') +
    '</div>';
}

function cancelSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('cancel-search').style.display = 'none';
}

async function sendRequest(targetId) {
  await db.from('friendships').insert({ requester_id: currentUser.id, receiver_id: targetId, status: 'pending' });
  loadFriends();
  searchUsers();
}

async function acceptFriend(friendshipId) {
  await db.from('friendships').update({ status: 'accepted' }).eq('id', friendshipId);
  loadFriends();
}

async function deleteFriend(friendshipId) {
  if (!confirm('Supprimer cette relation ?')) return;
  await db.from('friendships').delete().eq('id', friendshipId);
  loadFriends();
}

async function generateInvite() {
  var code = Math.random().toString(36).substring(2, 14).toUpperCase();
  await db.from('friend_invites').insert({ inviter_id: currentUser.id, code: code, expires_at: new Date(Date.now() + 7*86400000).toISOString() });
  var link = 'https://beauoupas.fr/invite/' + code;
  navigator.clipboard.writeText(link).then(function() { alert('✅ Lien copié !\n\n' + link); });
}

init();
</script>
</body>
</html>

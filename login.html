<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeauOuPas — Connexion</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box fade-in">
    <div class="auth-logo">BeauOuPas</div>
    <div class="auth-sub">Votez, comparez, choisissez !</div>

    <div class="card">
      <h2 style="font-size:22px;font-weight:900;margin-bottom:6px;">Connexion</h2>
      <p style="color:#666;font-size:14px;margin-bottom:24px;">Bon retour parmi nous 👋</p>

      <div id="error" class="alert alert-error"></div>

      <div style="display:flex;flex-direction:column;gap:14px;">
        <div>
          <label class="input-label">Email</label>
          <input class="input" type="email" id="email" placeholder="ton@email.com">
        </div>
        <div>
          <label class="input-label">Mot de passe</label>
          <input class="input" type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary btn-full" id="loginBtn" onclick="handleLogin()">
          🚀 Se connecter
        </button>
      </div>

      <div class="divider">ou</div>

      <button class="btn btn-secondary btn-full" onclick="handleGoogle()">
        <span style="font-size:18px;font-weight:900;">G</span> Continuer avec Google
      </button>

      <p style="text-align:center;margin-top:20px;font-size:14px;color:#666;">
        Pas encore de compte ?
        <a href="register.html" style="color:#E91E8C;font-weight:700;text-decoration:none;">S'inscrire</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
// Vérifier si déjà connecté
db.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'feed.html'
})

// Connexion email
async function handleLogin() {
  const email = document.getElementById('email').value
  const password = document.getElementById('password').value
  if (!email || !password) { showError('error', 'Remplis tous les champs.'); return }

  setLoading('loginBtn', true, '🚀 Se connecter')
  const { error } = await db.auth.signInWithPassword({ email, password })
  setLoading('loginBtn', false, '🚀 Se connecter')

  if (error) showError('error', 'Email ou mot de passe incorrect.')
  else window.location.href = 'feed.html'
}

// Connexion Google
async function handleGoogle() {
  await db.auth.signInWithOAuth({
    provider: 'google',
    options: { 
      redirectTo: 'https://serialv2.github.io/beauoupas-web/feed.html'
    }
  })
}

// Enter pour valider
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin()
})
</script>
</body>
</html>

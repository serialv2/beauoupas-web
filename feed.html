<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeauOuPas — Feed</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">BeauOuPas</div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <a href="projects-new.html" class="btn btn-primary btn-full" style="margin-bottom:14px;text-decoration:none;">➕ Nouveau projet</a>
    <div id="sidebar-user"></div>
  </div>
</aside>

<!-- Bottom nav mobile -->
<nav class="bottom-nav" id="bottom-nav"></nav>

<!-- Contenu -->
<main class="main-content">
  <div style="max-width:680px;margin:0 auto;">
    <div style="margin-bottom:28px;">
      <h1 style="font-size:28px;font-weight:900;">📸 Feed</h1>
      <p style="color:#666;margin-top:6px;font-size:14px;">Vote sur les projets de la communauté</p>
    </div>
    <div id="feed-container"><div class="spinner"></div></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="navbar.js"></script>
<script>
let currentUser = null
const votedIds = new Set()

async function init() {
  currentUser = await requireAuth()
  if (!currentUser) return
  renderNav('feed.html')
  loadSidebarProfile()
  loadFeed()
}

async function loadFeed() {
  const { data: projects } = await db
    .from('projects')
    .select('*, profiles(username, avatar_url), project_photos(id, url, vote_count)')
    .eq('status', 'active')
    .order('created_at', { ascending: false })
    .limit(30)

  if (!projects || projects.length === 0) {
    document.getElementById('feed-container').innerHTML = `
      <div class="card" style="text-align:center;padding:60px;">
        <div style="font-size:48px;margin-bottom:12px;">📭</div>
        <p style="color:#666;font-size:16px;">Aucun projet pour l'instant</p>
      </div>`
    return
  }

  document.getElementById('feed-container').innerHTML = projects.map(p => renderProject(p)).join('')
}

function renderProject(p) {
  const photos = p.project_photos || []
  const isDuel = photos.length === 2
  const username = p.profiles?.username || '?'
  const avatarUrl = p.profiles?.avatar_url
  const isOwn = p.user_id === currentUser.id
  const voted = votedIds.has(p.id)
  const canVote = !voted && !isOwn

  const avatarHtml = avatarUrl
    ? `<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover;" alt="">`
    : `<span style="font-size:16px;font-weight:900;">${username[0]?.toUpperCase()}</span>`

  let photosHtml = ''
  if (isDuel) {
    photosHtml = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;">
      ${photos.map((photo, i) => `
        <div style="position:relative;cursor:${canVote ? 'pointer' : 'default'};"
             onclick="${canVote ? `duelVote('${photo.id}','${photos[1-i].id}','${p.id}')` : ''}">
          <img src="${photo.url}" style="width:100%;aspect-ratio:1;object-fit:cover;display:block;" alt="">
          <div style="position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.6);border-radius:8px;padding:4px 10px;font-size:13px;font-weight:900;color:#E91E8C;">${i === 0 ? 'A' : 'B'}</div>
          ${voted ? `<div style="position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.7);border-radius:8px;padding:4px 8px;font-size:12px;">${photo.vote_count} votes</div>` : ''}
        </div>`).join('')}
    </div>`
  } else if (photos.length === 1) {
    photosHtml = `<div style="cursor:${canVote ? 'pointer' : 'default'};"
         onclick="${canVote ? `photoVote('${photos[0].id}','${p.id}')` : ''}">
      <img src="${photos[0].url}" style="width:100%;max-height:420px;object-fit:cover;display:block;" alt="">
    </div>`
  }

  return `<div class="card fade-in" style="padding:0;overflow:hidden;margin-bottom:20px;" id="project-${p.id}">
    <div style="display:flex;align-items:center;gap:12px;padding:16px 18px;">
      <div class="avatar" style="width:40px;height:40px;">${avatarHtml}</div>
      <div style="flex:1;">
        <div style="font-weight:800;font-size:14px;">@${username}</div>
        <div style="font-size:12px;color:#555;">${new Date(p.created_at).toLocaleDateString('fr-FR')}</div>
      </div>
      <span class="badge badge-pink">${isDuel ? '⚖️ Duel' : '📸 Vote'}</span>
    </div>
    ${p.title ? `<div style="padding:0 18px 14px;font-weight:700;font-size:16px;">${p.title}</div>` : ''}
    ${photosHtml}
    <div style="padding:14px 18px;display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:13px;color:#555;">🗳️ ${p.vote_count} votes</span>
      ${canVote ? `<span style="font-size:13px;color:#E91E8C;font-weight:700;">${isDuel ? '👆 Clique A ou B' : '👆 Clique pour voter'}</span>` : ''}
      ${voted ? `<span style="font-size:13px;color:#4CAF50;font-weight:700;">✅ Voté !</span>` : ''}
      ${isOwn ? `<span style="font-size:13px;color:#555;">Votre projet</span>` : ''}
    </div>
  </div>`
}

async function photoVote(photoId, projectId) {
  await db.from('photo_votes').insert({ user_id: currentUser.id, photo_id: photoId, project_id: projectId })
  votedIds.add(projectId)
  loadFeed()
}

async function duelVote(winnerId, loserId, projectId) {
  await db.from('duel_votes').insert({ user_id: currentUser.id, project_id: projectId, winner_photo_id: winnerId, loser_photo_id: loserId })
  votedIds.add(projectId)
  loadFeed()
}

init()
</script>
</body>
</html>

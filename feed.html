<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeauOuPas — Feed</title>

<link rel="stylesheet" href="style.css">

<style>
.vote-buttons { display:flex; gap:10px; padding:14px 18px; border-top:1px solid #1A1A1A; }
.vote-btn { flex:1; padding:14px 8px; border-radius:12px; border:2px solid #292929; background:transparent; color:#888; font-size:22px; cursor:pointer; display:flex; flex-direction:column; align-items:center; }
.vote-btn span.label { font-size:11px; }
.vote-btn.like:hover { border-color:#4CAF50; color:#4CAF50; }
.vote-btn.bof:hover { border-color:#FF9800; color:#FF9800; }
.vote-btn.dislike:hover { border-color:#ef5350; color:#ef5350; }

.project-card { margin-bottom:24px; position:relative; }
.voted-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.65); display:flex; align-items:center; justify-content:center; font-size:64px; }
</style>
</head>

<body>

<main class="main-content">
  <div style="max-width:600px;margin:0 auto;">
    <h1>📸 Feed</h1>
    <div id="feed-container"><div class="spinner"></div></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="navbar.js"></script>

<script>
var currentUser = null;
var currentProfile = null;
var projects = [];
var currentIndex = 0;

async function init() {
  try {
    currentUser = await requireAuth();

    if (!currentUser) {
      window.location.href = "login.html";
      return;
    }

    currentProfile = await getProfile(currentUser.id);

    if (!currentProfile || !currentProfile.username) {
      window.location.href = "complete-profile.html";
      return;
    }

    if (typeof renderNav === "function") renderNav("feed.html");
    if (typeof loadSidebarProfile === "function") loadSidebarProfile();

    await loadFeed();

  } catch (e) {
    showError(e);
  }
}

async function loadFeed() {
  try {
    document.getElementById("feed-container").innerHTML = '<div class="spinner"></div>';

    var result = await db.from("projects")
      .select("*")
      .eq("status", "approved")
      .eq("is_open", true)
      .neq("owner_id", currentUser.id)
      .limit(20);

    if (result.error) throw result.error;

    projects = result.data || [];

    if (projects.length === 0) {
      document.getElementById("feed-container").innerHTML =
        "<p style='text-align:center;color:#888'>Aucun projet disponible</p>";
      return;
    }

    currentIndex = 0;
    showProject();

  } catch (e) {
    showError(e);
  }
}

function showProject() {
  if (currentIndex >= projects.length) {
    document.getElementById("feed-container").innerHTML =
      "<p style='text-align:center'>🎉 Tout voté !</p>";
    return;
  }

  var p = projects[currentIndex];

  document.getElementById("feed-container").innerHTML =
    "<div class='card project-card'>" +
      "<h3>" + (p.title || "Sans titre") + "</h3>" +
      "<p>" + (p.description || "") + "</p>" +
      "<div class='vote-buttons'>" +
        "<button class='vote-btn like' onclick='vote(1)'>❤️</button>" +
        "<button class='vote-btn bof' onclick='vote(2)'>😐</button>" +
        "<button class='vote-btn dislike' onclick='vote(3)'>👎</button>" +
      "</div>" +
    "</div>";
}

async function vote(value) {
  try {
    var p = projects[currentIndex];

    var res = await db.from("photo_votes").insert({
      user_id: currentUser.id,
      project_id: p.id,
      rating: value
    });

    if (res.error) throw res.error;

    next();

  } catch (e) {
    console.error(e);
  }
}

function next() {
  currentIndex++;
  showProject();
}

function showError(e) {
  console.error(e);
  document.getElementById("feed-container").innerHTML =
    "<div style='color:red;text-align:center'>" +
    "Erreur : " + e.message +
    "</div>";
}

init();
</script>

</body>
</html>

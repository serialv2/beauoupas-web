<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeauOuPas — Feed</title>
<link rel="stylesheet" href="style.css">
<style>
.vote-buttons {
  display: flex;
  gap: 10px;
  padding: 14px 18px;
  border-top: 1px solid #1A1A1A;
}
.vote-btn {
  flex: 1;
  padding: 14px 8px;
  border-radius: 12px;
  border: 2px solid #292929;
  background: transparent;
  color: #888;
  font-size: 22px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.vote-btn span.label {
  font-size: 11px;
  color: #666;
}
.vote-btn.like:hover  { border-color: #4CAF50; background: rgba(76,175,80,0.1); color: #4CAF50; }
.vote-btn.bof:hover   { border-color: #FF9800; background: rgba(255,152,0,0.1); color: #FF9800; }
.vote-btn.dislike:hover { border-color: #ef5350; background: rgba(244,67,54,0.1); color: #ef5350; }
.duel-photo-btn {
  flex: 1;
  padding: 0;
  border: none;
  background: transparent;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.duel-photo-btn:hover .duel-overlay { opacity: 1; }
.duel-overlay {
  position: absolute;
  inset: 0;
  background: rgba(233,30,140,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  font-weight: 900;
  color: white;
  opacity: 0;
  transition: opacity 0.15s;
}
.project-card {
  margin-bottom: 24px;
  position: relative;
}
.voted-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  z-index: 10;
  border-radius: 22px;
  pointer-events: none;
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">BeauOuPas</div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <a href="projects-new.html" class="btn btn-primary btn-full" style="margin-bottom:14px;text-decoration:none;">➕ Nouveau projet</a>
    <div id="sidebar-user"></div>
  </div>
</aside>

<nav class="bottom-nav" id="bottom-nav"></nav>

<main class="main-content">
  <div style="max-width:600px;margin:0 auto;">
    <div style="margin-bottom:24px;">
      <h1 style="font-size:28px;font-weight:900;">📸 Feed</h1>
      <p style="color:#666;margin-top:6px;font-size:14px;">Vote sur les projets de la communauté</p>
    </div>
    <div id="feed-container"><div class="spinner"></div></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="navbar.js"></script>
<script>

var currentUser = null;
var currentProfile = null;
var projects = [];
var currentIndex = 0;

async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;
  renderNav('feed.html');
  loadSidebarProfile();
  currentProfile = await getProfile(currentUser.id);
  loadFeed();
}

async function loadFeed() {
  document.getElementById('feed-container').innerHTML = '<div class="spinner"></div>';

  var result = await db.from('projects')
    .select('*, profiles(username, avatar_url), project_photos(id, url, side)')
    .eq('status', 'approved')
    .eq('is_open', true)
    .neq('owner_id', currentUser.id)
    .order('created_at', { ascending: false })
    .limit(50);

  if (result.error) {
    document.getElementById('feed-container').innerHTML = '<div class="card" style="text-align:center;padding:40px;"><p style="color:#ef5350;">Erreur : ' + result.error.message + '</p></div>';
    return;
  }

  var allProjects = result.data || [];
  var allIds = allProjects.map(function(p) { return p.id; });
  var votedIds = new Set();

  if (allIds.length > 0) {
    var pv = await db.from('photo_votes').select('project_id').eq('user_id', currentUser.id).in('project_id', allIds);
    var dv = await db.from('duel_votes').select('project_id').eq('user_id', currentUser.id).in('project_id', allIds);
    (pv.data || []).forEach(function(v) { votedIds.add(v.project_id); });
    (dv.data || []).forEach(function(v) { votedIds.add(v.project_id); });
  }

  projects = allProjects.filter(function(p) { return !votedIds.has(p.id); });
  currentIndex = 0;
  showCurrentProject();
}

function showCurrentProject() {
  if (currentIndex >= projects.length) {
    document.getElementById('feed-container').innerHTML =
      '<div class="card" style="text-align:center;padding:60px;">' +
      '<div style="font-size:56px;margin-bottom:16px;">🎉</div>' +
      '<h3 style="font-size:20px;margin-bottom:10px;">Tout voté !</h3>' +
      '<p style="color:#666;">Tu as voté sur tous les projets disponibles.<br>Reviens plus tard !</p>' +
      '</div>';
    return;
  }

  var p = projects[currentIndex];
  var photos = (p.project_photos || []).slice().sort(function(a, b) {
    if (a.side === 'A') return -1;
    if (b.side === 'A') return 1;
    return 0;
  });
  var isDuel = p.type === 'duel' || photos.length === 2;
  var username = (p.profiles && p.profiles.username) ? p.profiles.username : '?';
  var avatarUrl = (p.profiles && p.profiles.avatar_url) ? p.profiles.avatar_url : null;
  var remaining = projects.length - currentIndex;

  var avatarHtml = avatarUrl
    ? '<img src="' + avatarUrl + '" style="width:100%;height:100%;object-fit:cover;" alt="">'
    : '<span style="font-size:16px;font-weight:900;">' + username[0].toUpperCase() + '</span>';

  var photosHtml = '';
  var buttonsHtml = '';

  if (isDuel && photos.length >= 2) {
    var photo0 = photos[0];
    var photo1 = photos[1];
    var side0 = photo0.side || 'A';
    var side1 = photo1.side || 'B';

    photosHtml =
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;">' +
        '<button class="duel-photo-btn" onclick="voteDuel(\'' + p.id + '\',\'' + side0 + '\')">' +
          '<img src="' + photo0.url + '" style="width:100%;aspect-ratio:1;object-fit:cover;display:block;" alt="">' +
          '<div style="position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.65);border-radius:8px;padding:4px 12px;font-size:14px;font-weight:900;color:#E91E8C;">' + side0 + '</div>' +
          '<div class="duel-overlay">✅ ' + side0 + '</div>' +
        '</button>' +
        '<button class="duel-photo-btn" onclick="voteDuel(\'' + p.id + '\',\'' + side1 + '\')">' +
          '<img src="' + photo1.url + '" style="width:100%;aspect-ratio:1;object-fit:cover;display:block;" alt="">' +
          '<div style="position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.65);border-radius:8px;padding:4px 12px;font-size:14px;font-weight:900;color:#E91E8C;">' + side1 + '</div>' +
          '<div class="duel-overlay">✅ ' + side1 + '</div>' +
        '</button>' +
      '</div>';
    buttonsHtml = '<div style="padding:12px 18px;text-align:center;"><p style="color:#888;font-size:13px;">👆 Clique sur A ou B pour voter</p></div>';

  } else if (photos.length >= 1) {
    photosHtml = '<div><img src="' + photos[0].url + '" style="width:100%;max-height:440px;object-fit:cover;display:block;" alt=""></div>';
    buttonsHtml =
      '<div class="vote-buttons">' +
        '<button class="vote-btn like" onclick="votePhoto(\'' + p.id + '\', 1)">' +
          '👍<span class="label">J\'aime</span>' +
        '</button>' +
        '<button class="vote-btn bof" onclick="votePhoto(\'' + p.id + '\', 0)">' +
          '😐<span class="label">Bof</span>' +
        '</button>' +
        '<button class="vote-btn dislike" onclick="votePhoto(\'' + p.id + '\', -1)">' +
          '👎<span class="label">J\'aime pas</span>' +
        '</button>' +
      '</div>';
  }

  var html =
    '<div class="card project-card" id="current-project">' +
      '<div style="display:flex;align-items:center;gap:12px;padding:14px 18px;">' +
        '<div class="avatar" style="width:40px;height:40px;">' + avatarHtml + '</div>' +
        '<div style="flex:1;">' +
          '<div style="font-weight:800;font-size:14px;">@' + username + '</div>' +
          '<div style="font-size:12px;color:#555;">' + new Date(p.created_at).toLocaleDateString('fr-FR') + '</div>' +
        '</div>' +
        '<span class="badge badge-pink">' + (isDuel ? '⚖️ Duel' : '📸 Vote') + '</span>' +
        '<span style="font-size:12px;color:#444;margin-left:8px;">' + remaining + ' restant' + (remaining > 1 ? 's' : '') + '</span>' +
      '</div>' +
      (p.title ? '<div style="padding:0 18px 12px;font-weight:700;font-size:16px;">' + p.title + '</div>' : '') +
      (p.description ? '<div style="padding:0 18px 12px;font-size:14px;color:#777;">' + p.description + '</div>' : '') +
      photosHtml +
      buttonsHtml +
      '<div style="padding:8px 18px 14px;text-align:center;">' +
        '<button onclick="skipProject()" style="background:none;border:none;color:#444;cursor:pointer;font-size:13px;padding:8px 16px;">Passer →</button>' +
      '</div>' +
    '</div>';

  document.getElementById('feed-container').innerHTML = html;
}

async function votePhoto(projectId, ratingValue) {
  // Désactiver les boutons
  var buttons = document.querySelectorAll('.vote-btn');
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].disabled = true;
    buttons[i].style.opacity = '0.4';
  }

  var gender = currentProfile ? currentProfile.gender : null;
  var age = (currentProfile && currentProfile.birth_date) ? getAge(currentProfile.birth_date) : null;

  var result = await db.from('photo_votes').insert({
    user_id: currentUser.id,
    project_id: projectId,
    rating: ratingValue,
    voter_gender: gender,
    voter_age: age
  });

  if (result.error) {
    console.error('Erreur vote:', result.error);
    var buttons2 = document.querySelectorAll('.vote-btn');
    for (var j = 0; j < buttons2.length; j++) {
      buttons2[j].disabled = false;
      buttons2[j].style.opacity = '1';
    }
    return;
  }

  var emoji = ratingValue === 1 ? '👍' : ratingValue === 0 ? '😐' : '👎';
  showVotedOverlay(emoji);
  setTimeout(function() { nextProject(); }, 700);
}

async function voteDuel(projectId, chosenSide) {
  var buttons = document.querySelectorAll('.duel-photo-btn');
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].disabled = true;
  }

  var gender = currentProfile ? currentProfile.gender : null;
  var age = (currentProfile && currentProfile.birth_date) ? getAge(currentProfile.birth_date) : null;

  var result = await db.from('duel_votes').insert({
    user_id: currentUser.id,
    project_id: projectId,
    chosen_side: chosenSide,
    voter_gender: gender,
    voter_age: age
  });

  if (result.error) {
    console.error('Erreur vote duel:', result.error);
    var buttons2 = document.querySelectorAll('.duel-photo-btn');
    for (var j = 0; j < buttons2.length; j++) {
      buttons2[j].disabled = false;
    }
    return;
  }

  showVotedOverlay('✅');
  setTimeout(function() { nextProject(); }, 700);
}

function showVotedOverlay(emoji) {
  var card = document.getElementById('current-project');
  if (!card) return;
  var overlay = document.createElement('div');
  overlay.className = 'voted-overlay';
  overlay.textContent = emoji;
  card.appendChild(overlay);
}

function nextProject() {
  currentIndex++;
  showCurrentProject();
}

function skipProject() {
  currentIndex++;
  showCurrentProject();
}

function getAge(birthDate) {
  var today = new Date();
  var birth = new Date(birthDate);
  var age = today.getFullYear() - birth.getFullYear();
  if (today < new Date(today.getFullYear(), birth.getMonth(), birth.getDate())) age--;
  return age;
}

init();

</script>
</body>
</html>

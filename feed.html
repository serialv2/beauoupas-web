<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeauOuPas — Feed</title>
<link rel="stylesheet" href="style.css">

<style>
.vote-buttons { display:flex; gap:10px; padding:14px 18px; border-top:1px solid #1A1A1A; }
.vote-btn { flex:1; padding:14px 8px; border-radius:12px; border:2px solid #292929; background:transparent; color:#888; font-size:22px; cursor:pointer; transition:all 0.15s; font-family:Arial; display:flex; flex-direction:column; align-items:center; gap:4px; }
.vote-btn span.label { font-size:11px; color:#666; }
.vote-btn.like:hover { border-color:#4CAF50; background:rgba(76,175,80,0.1); color:#4CAF50; }
.vote-btn.bof:hover { border-color:#FF9800; background:rgba(255,152,0,0.1); color:#FF9800; }
.vote-btn.dislike:hover { border-color:#ef5350; background:rgba(244,67,54,0.1); color:#ef5350; }
.duel-photo-btn { flex:1; padding:0; border:none; background:transparent; cursor:pointer; position:relative; overflow:hidden; }
.duel-overlay { position:absolute; inset:0; background:rgba(233,30,140,0.35); display:flex; align-items:center; justify-content:center; font-size:36px; font-weight:900; color:white; opacity:0; transition:opacity 0.15s; }
.duel-photo-btn:hover .duel-overlay { opacity:1; }
.project-card { margin-bottom:24px; position:relative; }
.voted-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.65); display:flex; align-items:center; justify-content:center; font-size:64px; z-index:10; border-radius:22px; pointer-events:none; }
</style>
</head>

<body>

<aside class="sidebar">
  <div class="sidebar-logo">BeauOuPas</div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <a href="projects-new.html" class="btn btn-primary btn-full">➕ Nouveau projet</a>
    <div id="sidebar-user"></div>
  </div>
</aside>

<nav class="bottom-nav" id="bottom-nav"></nav>

<main class="main-content">
  <div style="max-width:600px;margin:0 auto;">
    <h1>📸 Feed</h1>
    <div id="feed-container"><div class="spinner"></div></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="navbar.js"></script>

<script>
var currentUser = null;
var projects = [];
var currentIndex = 0;

// 🔥 NOUVEAU
var feedSeed = Date.now().toString();
var feedLimit = 20;
var feedOffset = 0;

async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;

  renderNav("feed.html");
  loadSidebarProfile();

  await loadFeed();
}

async function loadFeed() {
  try {

    // 🔥 APPEL RPC SUPABASE
    var feedResult = await db.rpc("get_feed_projects", {
      p_user_id: currentUser.id,
      p_limit: feedLimit,
      p_offset: feedOffset,
      p_seed: feedSeed
    });

    if (feedResult.error) throw feedResult.error;

    var ids = (feedResult.data || []).map(p => p.id);

    if (ids.length === 0) {
      projects = [];
      showCurrentProject();
      return;
    }

    // 🔥 récupère les détails
    var result = await db.from("projects")
      .select("*, profiles(username, avatar_url), project_photos(*), poll_options(*)")
      .in("id", ids);

    if (result.error) throw result.error;

    // 🔥 garder ordre RPC
    projects = ids.map(id => result.data.find(p => p.id === id)).filter(p => p);

    currentIndex = 0;
    showCurrentProject();

  } catch (e) {
    console.error(e);
  }
}

function showCurrentProject() {

  if (currentIndex >= projects.length) {
    document.getElementById("feed-container").innerHTML = "🎉 Plus de projets";
    return;
  }

  var p = projects[currentIndex];

  var photo = (p.project_photos || [])[0];

  document.getElementById("feed-container").innerHTML = `
    <div class="card project-card" id="current-project">
      <h3>${p.title || ""}</h3>
      ${photo ? `<img src="${photo.url}" style="width:100%">` : ""}

      <div class="vote-buttons">
        <button class="vote-btn like" onclick="votePhoto('${p.id}',3)">❤️</button>
        <button class="vote-btn bof" onclick="votePhoto('${p.id}',2)">😐</button>
        <button class="vote-btn dislike" onclick="votePhoto('${p.id}',1)">👎</button>
      </div>
    </div>
  `;
}

async function votePhoto(projectId, rating) {

  await db.from("photo_votes").insert({
    user_id: currentUser.id,
    project_id: projectId,
    rating: rating
  });

  await db.rpc("add_vote_credits", { p_user_id: currentUser.id });

  nextProject();
}

function nextProject() {
  currentIndex++;

  // 🔥 pagination automatique
  if (currentIndex >= projects.length) {
    feedOffset += feedLimit;
    loadFeed();
    return;
  }

  showCurrentProject();
}

init();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeauOuPas — Profil</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">BeauOuPas</div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <a href="projects-new.html" class="btn btn-primary btn-full" style="margin-bottom:14px;text-decoration:none;">➕ Nouveau projet</a>
    <div id="sidebar-user"></div>
  </div>
</aside>
<nav class="bottom-nav" id="bottom-nav"></nav>

<main class="main-content">
  <div style="max-width:560px;margin:0 auto;">
    <h1 style="font-size:28px;font-weight:900;margin-bottom:24px;">👤 Mon profil</h1>

    <!-- Card avatar -->
    <div class="card" style="display:flex;align-items:center;gap:18px;margin-bottom:20px;padding:20px 24px;">
      <div class="avatar" id="avatar-display" style="width:64px;height:64px;font-size:26px;">?</div>
      <div>
        <div id="display-username" style="font-weight:900;font-size:20px;"></div>
        <div id="display-email" style="color:#555;font-size:14px;margin-top:4px;"></div>
        <div id="display-credits" style="color:#E91E8C;font-size:14px;font-weight:700;margin-top:6px;"></div>
      </div>
    </div>

    <div class="card" style="padding:28px;">
      <div id="error" class="alert alert-error"></div>
      <div id="success" class="alert alert-success"></div>

      <div style="display:flex;flex-direction:column;gap:16px;">
        <div>
          <label class="input-label">Pseudo</label>
          <input class="input" id="username" placeholder="@monpseudo">
        </div>
        <div>
          <label class="input-label">Téléphone</label>
          <input class="input" id="phone" placeholder="+33 6 00 00 00 00">
        </div>
        <div>
          <label class="input-label">Genre</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;" id="gender-buttons">
            <button class="btn btn-ghost" onclick="setGender('male')" id="g-male" style="padding:11px;border-radius:10px;font-size:13px;">Homme</button>
            <button class="btn btn-ghost" onclick="setGender('female')" id="g-female" style="padding:11px;border-radius:10px;font-size:13px;">Femme</button>
            <button class="btn btn-ghost" onclick="setGender('other')" id="g-other" style="padding:11px;border-radius:10px;font-size:13px;">Autre</button>
            <button class="btn btn-ghost" onclick="setGender('prefer_not_to_say')" id="g-prefer" style="padding:11px;border-radius:10px;font-size:13px;">Préfère ne pas préciser</button>
          </div>
        </div>
        <button class="btn btn-primary btn-full" id="saveBtn" onclick="handleSave()">💾 Sauvegarder</button>
      </div>

      <div style="margin-top:28px;padding-top:20px;border-top:1px solid #1A1A1A;">
        <button class="btn btn-ghost btn-full" onclick="handleSignOut()" style="color:#ef5350;border-color:rgba(244,67,54,0.3);">↩ Se déconnecter</button>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="navbar.js"></script>
<script>
let currentUser = null
let selectedGender = ''

async function init() {
  currentUser = await requireAuth()
  if (!currentUser) return
  renderNav('profile.html')
  loadSidebarProfile()
  loadProfile()
}

async function loadProfile() {
  const profile = await getProfile(currentUser.id)
  if (!profile) return

  document.getElementById('username').value = profile.username || ''
  document.getElementById('phone').value = profile.phone || ''
  selectedGender = profile.gender || ''
  updateGenderButtons()

  // Avatar
  const avatarEl = document.getElementById('avatar-display')
  if (profile.avatar_url) {
    avatarEl.innerHTML = `<img src="${profile.avatar_url}" alt="">`
  } else {
    avatarEl.textContent = profile.username?.[0]?.toUpperCase() || '?'
  }

  document.getElementById('display-username').textContent = '@' + profile.username
  document.getElementById('display-email').textContent = currentUser.email
  document.getElementById('display-credits').textContent = '💰 ' + profile.credits + ' crédits'
}

function setGender(g) {
  selectedGender = g
  updateGenderButtons()
}

function updateGenderButtons() {
  const map = { male: 'g-male', female: 'g-female', other: 'g-other', prefer_not_to_say: 'g-prefer' }
  Object.entries(map).forEach(([g, id]) => {
    const btn = document.getElementById(id)
    if (!btn) return
    if (g === selectedGender) {
      btn.style.cssText = 'padding:11px;border-radius:10px;font-size:13px;background:rgba(233,30,140,0.1);border:2px solid #E91E8C;color:#E91E8C;font-weight:800;'
    } else {
      btn.style.cssText = 'padding:11px;border-radius:10px;font-size:13px;background:transparent;border:1px solid #292929;color:#888;font-weight:400;'
    }
  })
}

async function handleSave() {
  const username = document.getElementById('username').value.trim()
  const phone = document.getElementById('phone').value.trim()
  if (!username) { showError('error', 'Le pseudo est obligatoire.'); return }

  setLoading('saveBtn', true, '💾 Sauvegarder')
  document.getElementById('error').style.display = 'none'

  const { error } = await db.from('profiles').update({ username, phone, gender: selectedGender }).eq('id', currentUser.id)

  setLoading('saveBtn', false, '💾 Sauvegarder')
  if (error) showError('error', error.message)
  else showSuccess('success', '✅ Profil mis à jour !')
}

async function handleSignOut() {
  if (!confirm('Se déconnecter ?')) return
  await db.auth.signOut()
  window.location.href = 'login.html'
}

init()
</script>
</body>
</html>

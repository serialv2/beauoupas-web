<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeauOuPas — Mes projets</title>

<link rel="stylesheet" href="style.css">

<style>
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(90px,1fr)); gap:10px; margin-top:14px; }
.stat-box { background:#1A1A1A; border:1px solid #292929; border-radius:12px; padding:12px; text-align:center; }
.stat-value { font-size:22px; font-weight:900; }
.stat-label { font-size:11px; color:#666; margin-top:4px; }
</style>
</head>

<body>

<main class="main-content">
  <div style="max-width:900px;margin:0 auto;">
    <h1>📸 Mes projets</h1>
    <p id="count"></p>
    <div id="projects-container">Chargement...</div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

<script>
var currentUser = null;

async function init() {
  try {
    currentUser = await requireAuth();
    if (!currentUser) return;

    await loadProjects();

  } catch (e) {
    console.error(e);
    document.getElementById("projects-container").innerHTML =
      "Erreur : " + e.message;
  }
}

async function loadProjects() {
  var result = await db.from("projects")
    .select("*")
    .eq("owner_id", currentUser.id);

  if (result.error) {
    document.getElementById("projects-container").innerHTML =
      "Erreur : " + result.error.message;
    return;
  }

  var list = result.data || [];
  document.getElementById("count").textContent = list.length + " projets";

  if (list.length === 0) {
    document.getElementById("projects-container").innerHTML =
      "<p>Aucun projet</p>";
    return;
  }

  var html = list.map(function(p) {
    return `
      <div class="card" style="margin-bottom:20px;padding:20px;">
        <h3>${p.title || "Sans titre"}</h3>
        <p>${p.description || ""}</p>

        <button onclick="deleteProject('${p.id}')"
          style="background:#ef5350;color:white;border:none;padding:10px;border-radius:8px;cursor:pointer;">
          🗑️ Supprimer
        </button>
      </div>
    `;
  }).join("");

  document.getElementById("projects-container").innerHTML = html;
}

async function deleteProject(id) {
  if (!confirm("Supprimer ce projet ?")) return;

  try {
    console.log("Suppression :", id);

    let r = await db.from("projects")
      .delete()
      .eq("id", id)
      .eq("owner_id", currentUser.id);

    if (r.error) throw r.error;

    alert("Supprimé !");
    loadProjects();

  } catch (e) {
    console.error(e);
    alert("Erreur : " + e.message);
  }
}

init();
</script>

</body>
</html>
